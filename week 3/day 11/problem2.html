<!DOCTYPE html>
<html>
<head>
    <title>FAQ </title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #fef6f9;
            padding: 40px;
        }

        .faq-container {
            width: 600px;
            margin: auto;
        }

        .question {
            background: #cdb4db;
            padding: 15px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        .answer {
            display: none;
            background: #ffc8dd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 5px;
        }

        .active {
            background: #a2d2ff;
        }

        h2{
            text-align: center;
        }
    </style>
</head>

<body>

<h2>FAQ Section</h2>

<div class="faq-container">

    <div class="question">What is jQuery?</div>
    <div class="question">What is slideToggle()?</div>
    <div class="question">What is DOM?</div>
    <div class="question">Why use CSS?</div>
    <div class="question">What is Event Handling?</div>

    <div class="answer">jQuery is a JS library.</div>
    <div class="answer">slideToggle shows/hides with animation.</div>
    <div class="answer">DOM represents HTML structure.</div>
    <div class="answer">CSS styles web pages.</div>
    <div class="answer">Event handling reacts to user actions.</div>

</div>

<script>
$(document).ready(function(){

    $(".question").click(function(){

        let index = $(this).index(); 

        $(".answer").eq(index).slideToggle(600);

        $(this).toggleClass("active");

    });

});
</script>

</body>
</html>
