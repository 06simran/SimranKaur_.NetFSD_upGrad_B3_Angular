<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fff6fb;
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #6d6875;
        }

        #cartBox {
            background: #cdb4db;
            width: 250px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            font-size: 18px;
            color: white;
        }

        .product {
            background: #ffc8dd;
            width: 350px;
            margin: 15px auto;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .addBtn {
            background: #bde0fe;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .addBtn:hover {
            background: #a2d2ff;
        }

        .message {
            display: block;
            margin-top: 10px;
            font-size: 14px;
            color: #6a994e;
        }
    </style>
</head>

<body>

<h2>Products</h2>

<div id="cartBox">
     Cart Items: <span id="counter">0</span>
</div>

<div id="productList">

    <div class="product">
        <h4>Notebook</h4>
        <button class="addBtn">Add to Cart</button>
        <span class="message"></span>
    </div>

    <div class="product">
        <h4>Water Bottle</h4>
        <button class="addBtn">Add to Cart</button>
        <span class="message"></span>
    </div>

    <div class="product">
        <h4>Bread</h4>
        <button class="addBtn">Add to Cart</button>
        <span class="message"></span>
    </div>

    <div class="product">
        <h4>Candle</h4>
        <button class="addBtn">Add to Cart</button>
        <span class="message"></span>
    </div>

</div>

<script>

$(document).ready(function(){

    let cartCount = 0;  

    $("#productList").on("click", ".addBtn", function(){

        cartCount++; 

        $("#counter").text(cartCount); 

        $(this).prop("disabled", true);  

        $(this).text("Added ");  

        $(this).attr("title", "Item already added"); 

        $(this).siblings(".message").text(" Added successfully!");
    });

});

</script>

</body>
</html>
