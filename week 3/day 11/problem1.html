<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>

    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            background-color:#f8f4ff;
            font-family: Arial, sans-serif;
        }

        .container{
            width:400px;
            margin:60px auto;
            background:#fff0f6;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#6a4c93;
        }

        label{
            display:block;
            margin-top:15px;
            color:#6a4c93;
        }

        input, select, textarea{
            width:100%;
            padding:8px;
            margin-top:5px;
            border:1px solid #d8c3f5;
            border-radius:8px;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:10px;
            background:#b8c0ff;
            border:none;
            border-radius:8px;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#9fa8ff;
        }

        .message{
            margin-top:15px;
            padding:10px;
            border-radius:8px;
            text-align:center;
            display:none;
        }

        .success{
            background:#d4edda;
            color:#155724;
        }

        .error{
            background:#f8d7da;
            color:#721c24;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Feedback Form</h2>

    <label>Name</label>
    <input type="text" id="name" required>

    <label>Email</label>
    <input type="email" id="emailid" required>

    <label>Course Rating</label>
    <select id="rating">
        <option value="">Select Rating</option>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
    </select>

    <label>Comments</label>
    <textarea id="comments"></textarea>

    <button id="submitBtn">Submit</button>

    <div class="message" id="msg"></div>
</div>

<script>
$(document).ready(function(){

    $("#submitBtn").click(function(){

        let name = $("#name").val().trim();
        let email = $("#emailid").val().trim();

        if(name === "" && email === ""){
    $("#msg")
        .removeClass("success")
        .addClass("error")
        .text("Name and Email cannot be empty!")
        .fadeIn();
}
else if(name === ""){
    $("#msg")
        .removeClass("success")
        .addClass("error")
        .text("Name cannot be empty!")
        .fadeIn();
}
else if(email === ""){
    $("#msg")
        .removeClass("success")
        .addClass("error")
        .text("Email cannot be empty!")
        .fadeIn();
}
        else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    $("#msg")
        .removeClass("success")
        .addClass("error")
        .text("Please enter a valid email")
        .fadeIn();
}
        else{
            $("#msg")
                .removeClass("error")
                .addClass("success")
                .text("Feedback submitted successfully!")
                .fadeIn();

            $("#name").val("");
            $("#email").val("");
            $("#rating").val("");
            $("#comments").val("");
        }

    });

});
</script>

</body>
</html>
